<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puissance 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --p1:       #ff2055;
      --p1-dim:   #8b0020;
      --p1-glow:  rgba(255, 32, 85, 0.55);
      --p2:       #ffb800;
      --p2-dim:   #7a5500;
      --p2-glow:  rgba(255, 184, 0, 0.55);
      --accent:   #00e5ff;
      --gold:     #ffd700;
      --silver:   #c0c8d8;
      --bronze:   #cd7f32;
      --cell-bg:  #050810;
      --board-bg: #0c1120;
      --surface:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.07);
      --text:     #dde1f5;
      --muted:    rgba(221,225,245,0.38);
      --cell-sz:  70px;
      --gap:      8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07080f;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(255,32,85,.05) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 85% 75%, rgba(0,229,255,.04) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none; z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════════════════ LOGO (réutilisé) ════════════════════ */
    .logo { text-align: center; }

    .logo h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 7rem;
      letter-spacing: 8px;
      line-height: .9;
      background: linear-gradient(160deg, #ffffff 0%, rgba(255,255,255,.45) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,255,255,.06));
    }

    .logo-sub {
      display: block;
      font-size: .65rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .logo-pips { display: flex; justify-content: center; gap: 8px; margin-top: 14px; }
    .pip { width: 10px; height: 10px; border-radius: 50%; }
    .pip.r { background: var(--p1); box-shadow: 0 0 8px var(--p1-glow); }
    .pip.y { background: var(--p2); box-shadow: 0 0 8px var(--p2-glow); }

    /* ════════════════════ BOUTONS (base) ════════════════════ */
    .menu-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .menu-label {
      font-size: .63rem;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-group { display: flex; gap: 8px; }

    button {
      padding: 10px 22px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: .82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: .3px;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      transition: background .18s, color .18s, border-color .18s, box-shadow .18s, transform .1s;
    }

    button:hover { background: rgba(255,255,255,.08); color: var(--text); border-color: rgba(255,255,255,.18); }
    button.active { background: rgba(0,229,255,.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 14px rgba(0,229,255,.18); }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .3; cursor: not-allowed; }

    .btn-play {
      padding: 15px 56px;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 4px;
      cursor: pointer;
      background: linear-gradient(140deg, var(--p1) 0%, #c4003a 100%);
      color: #fff;
      box-shadow: 0 0 28px var(--p1-glow), 0 6px 20px rgba(0,0,0,.5);
      transition: all .2s;
    }
    .btn-play:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--p1-glow), 0 10px 28px rgba(0,0,0,.6); }
    .btn-play:active { transform: translateY(0); }

    /* ════════════════════ LOGIN ════════════════════ */
    #login {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: relative;
      z-index: 1;
      animation: fadeUp .5s ease both;
    }

    .login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      min-width: 280px;
    }

    .login-box p { font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }

    #login-input {
      width: 100%;
      padding: 12px 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      letter-spacing: .5px;
      text-align: center;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #login-input::placeholder { color: var(--muted); }
    #login-input:focus { border-color: var(--accent); box-shadow: 0 0 14px rgba(0,229,255,.15); }

    /* ════════════════════ MENU ════════════════════ */
    #menu {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      position: relative;
      z-index: 1;
      animation: fadeUp .5s ease both;
    }

    #level-group { display: none; flex-direction: column; align-items: center; gap: 10px; }

    /* User card */
    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .user-card:hover { border-color: rgba(255,255,255,.2); }

    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(140deg, var(--p1) 0%, #c4003a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: .85rem;
      letter-spacing: 0;
      color: #fff;
      flex-shrink: 0;
    }

    .user-info { display: flex; flex-direction: column; gap: 1px; }

    #user-name {
      font-size: .82rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }

    #user-stats {
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .3px;
    }

    .menu-actions { display: flex; gap: 10px; flex-direction: column; align-items: center; }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(0,229,255,.25);
      color: var(--accent);
      font-size: .78rem;
      letter-spacing: 1px;
      padding: 8px 28px;
    }
    .btn-secondary:hover { background: rgba(0,229,255,.08); border-color: var(--accent); }

    /* ════════════════════ GAME ════════════════════ */
    #game {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 1;
      animation: fadeUp .35s ease both;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 26px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      min-width: 210px;
      justify-content: center;
    }

    .token-indicator {
      width: 16px; height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }

    #status-text { font-size: .82rem; font-weight: 500; letter-spacing: .4px; white-space: nowrap; }

    #board-wrapper {
      background: linear-gradient(150deg, var(--board-bg), #080c18);
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03), 0 28px 90px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.04);
      position: relative;
    }

    #col-arrow {
      position: absolute;
      top: -22px; left: 16px;
      width: var(--cell-sz);
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,.25);
      pointer-events: none;
      transition: left .08s, opacity .15s;
      opacity: 0;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, var(--cell-sz));
      grid-template-rows: repeat(6, var(--cell-sz));
      gap: var(--gap);
    }

    .cell {
      width: var(--cell-sz); height: var(--cell-sz);
      border-radius: 50%;
      background: var(--cell-bg);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 3px 8px rgba(0,0,0,.9), inset 0 0 0 1px rgba(255,255,255,.04);
      transition: box-shadow .15s;
    }

    .cell.hover-col {
      box-shadow: inset 0 3px 8px rgba(0,0,0,.9), inset 0 0 0 1px rgba(255,255,255,.12), 0 0 10px rgba(255,255,255,.04);
    }

    .token {
      position: absolute; inset: 0;
      border-radius: 50%;
      top: -100%;
      animation: drop var(--drop-dur, .38s) cubic-bezier(.25, 0, .3, 1.5) forwards;
    }

    @keyframes drop { 0% { top: -100%; } 100% { top: 0; } }

    .token.p1 { background: radial-gradient(circle at 36% 28%, #ff7090 0%, var(--p1) 48%, var(--p1-dim) 100%); box-shadow: 0 2px 8px rgba(0,0,0,.6); }
    .token.p2 { background: radial-gradient(circle at 36% 28%, #ffe066 0%, var(--p2) 48%, var(--p2-dim) 100%); box-shadow: 0 2px 8px rgba(0,0,0,.6); }

    .cell.winner .token.p1 { box-shadow: 0 0 0 2px var(--p1), 0 0 22px 5px var(--p1-glow); animation: glow-p1 .9s ease-in-out infinite alternate; }
    .cell.winner .token.p2 { box-shadow: 0 0 0 2px var(--p2), 0 0 22px 5px var(--p2-glow); animation: glow-p2 .9s ease-in-out infinite alternate; }

    @keyframes glow-p1 {
      from { box-shadow: 0 0 0 2px var(--p1), 0 0 14px 3px var(--p1-glow); transform: scale(1); }
      to   { box-shadow: 0 0 0 3px var(--p1), 0 0 30px 10px var(--p1-glow); transform: scale(1.06); }
    }
    @keyframes glow-p2 {
      from { box-shadow: 0 0 0 2px var(--p2), 0 0 14px 3px var(--p2-glow); transform: scale(1); }
      to   { box-shadow: 0 0 0 3px var(--p2), 0 0 30px 10px var(--p2-glow); transform: scale(1.06); }
    }

    .thinking::after { content: ''; display: inline-block; width: 1.5ch; animation: thinkdots 1s steps(3, end) infinite; }
    @keyframes thinkdots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

    #game-btns { display: flex; gap: 10px; }

    /* ── Commentaire en direct ── */
    #commentary {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 64px;
      justify-content: center;
    }
    .comm-line { display: flex; align-items: center; gap: 9px; animation: fadeUp .3s ease both; }
    .comm-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .comm-dot.p1 { background: var(--p1); box-shadow: 0 0 8px var(--p1-glow); }
    .comm-dot.p2 { background: var(--p2); box-shadow: 0 0 8px var(--p2-glow); }
    .comm-text { font-size: .8rem; letter-spacing: .2px; color: var(--muted); transition: color .2s; }
    .comm-line:last-child .comm-text { color: var(--text); }
    .comm-text.win    { color: var(--accent); font-weight: 500; }
    .comm-text.block  { color: #6ee7a0; }
    .comm-text.threat { color: var(--p2); }

    /* Plateau focusable au clavier */
    #board:focus { outline: none; }
    #board-wrapper:has(#board:focus) {
      border-color: rgba(0,229,255,.35);
      box-shadow: 0 0 0 1px rgba(0,229,255,.12), 0 28px 90px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.04);
    }

    /* ════════════════════ LEADERBOARD ════════════════════ */
    #leaderboard {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp .4s ease both;
      width: min(600px, 96vw);
    }

    .lb-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lb-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 5px;
      background: linear-gradient(120deg, #fff, rgba(255,255,255,.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lb-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    #lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    #lb-table thead tr {
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid var(--border);
    }

    #lb-table th {
      padding: 12px 14px;
      text-align: left;
      font-size: .62rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    #lb-table th.right, #lb-table td.right { text-align: right; }

    #lb-table td {
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      color: var(--text);
      vertical-align: middle;
    }

    #lb-table tbody tr:last-child td { border-bottom: none; }

    #lb-table tbody tr { transition: background .15s; }
    #lb-table tbody tr:hover { background: rgba(255,255,255,.03); }

    #lb-table tbody tr.me {
      background: rgba(0,229,255,.05);
      border-left: 2px solid var(--accent);
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: .9rem;
      letter-spacing: 0;
    }

    .rank-1 { background: rgba(255,215,0,.15); color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,.25); }
    .rank-2 { background: rgba(192,200,216,.1); color: var(--silver); }
    .rank-3 { background: rgba(205,127,50,.12); color: var(--bronze); }
    .rank-n { color: var(--muted); font-size: .75rem; font-family: 'DM Sans', sans-serif; }

    .player-name { font-weight: 500; display: flex; align-items: center; gap: 8px; }

    .you-tag {
      font-size: .55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,.4);
      border-radius: 4px;
      padding: 1px 5px;
    }

    .score-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .stat-win  { color: #6ee7a0; }
    .stat-loss { color: rgba(255,100,100,.65); }
    .stat-draw { color: var(--muted); }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      :root { --cell-sz: 44px; --gap: 6px; }
      .logo h1 { font-size: 4.5rem; letter-spacing: 5px; }
      #board-wrapper { padding: 12px; border-radius: 16px; }
      #lb-table th, #lb-table td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN ══ -->
  <div id="login">
    <div class="logo">
      <h1>Puissance 4</h1>
      <span class="logo-sub">Jeu de stratégie</span>
      <div class="logo-pips">
        <div class="pip r"></div><div class="pip y"></div>
        <div class="pip r"></div><div class="pip y"></div>
        <div class="pip r"></div><div class="pip y"></div>
      </div>
    </div>
    <div class="login-box">
      <p>Votre pseudo</p>
      <input id="login-input" type="text" maxlength="16" placeholder="ex: Nexus_77" autocomplete="off">
      <button class="btn-play" onclick="doLogin()">ENTRER</button>
    </div>
  </div>

  <!-- ══ MENU ══ -->
  <div id="menu">

    <div class="logo">
      <h1>Puissance 4</h1>
      <span class="logo-sub">Jeu de stratégie</span>
      <div class="logo-pips">
        <div class="pip r"></div><div class="pip y"></div>
        <div class="pip r"></div><div class="pip y"></div>
        <div class="pip r"></div><div class="pip y"></div>
      </div>
    </div>

    <!-- User card -->
    <div class="user-card" onclick="showLeaderboard()">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <span id="user-name">—</span>
        <span id="user-stats">0V · 0D · 0N</span>
      </div>
    </div>

    <div class="menu-section">
      <span class="menu-label">Mode de jeu</span>
      <div class="btn-group">
        <button id="btn-2p" class="active" onclick="selectMode('2p')">2 Joueurs</button>
        <button id="btn-ai" onclick="selectMode('ai')">Joueur vs IA</button>
      </div>
    </div>

    <div id="level-group">
      <span class="menu-label">Niveau de l'IA</span>
      <div class="btn-group">
        <button id="btn-easy"   onclick="selectLevel('easy')">Facile</button>
        <button id="btn-medium" onclick="selectLevel('medium')" class="active">Moyen</button>
        <button id="btn-hard"   onclick="selectLevel('hard')">Difficile</button>
      </div>
    </div>

    <div class="menu-actions">
      <button class="btn-play" onclick="startGame()">JOUER</button>
      <button class="btn-secondary" onclick="showLeaderboard()">Classement</button>
    </div>

  </div>

  <!-- ══ JEU ══ -->
  <div id="game">
    <div id="status">
      <span class="token-indicator" id="status-token"></span>
      <span id="status-text"></span>
    </div>
    <div id="board-wrapper">
      <div id="col-arrow">▼</div>
      <div id="board" tabindex="0" role="grid"
           aria-label="Plateau Puissance 4. Flèches gauche/droite pour choisir la colonne, Entrée pour jouer."></div>
    </div>
    <div id="commentary" aria-live="polite" aria-label="Commentaire de la partie"></div>
    <div id="game-btns">
      <button onclick="restartGame()">Rejouer</button>
      <button onclick="showMenu()">Menu</button>
    </div>
  </div>

  <!-- ══ CLASSEMENT ══ -->
  <div id="leaderboard">
    <div class="lb-header">
      <span class="lb-title">Classement</span>
      <button onclick="showMenu()">← Retour</button>
    </div>
    <div class="lb-wrap">
      <table id="lb-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Joueur</th>
            <th class="right">V</th>
            <th class="right">D</th>
            <th class="right">N</th>
            <th class="right">Score</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
    <p style="font-size:.62rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Score = Victoires × 3 + Nuls</p>
  </div>

  <!-- Moteur partagé (mêmes fonctions que celles couvertes par tests/game.test.js) -->
  <script src="js/engine.js"></script>

  <script>
    // === ÉTAT DE PARTIE (s'appuie sur le moteur js/engine.js) ===
    // ROWS, COLS, createBoard, dropPiece, findWin, getValidCols, AI, Commentary
    // proviennent de engine.js (variables globales partagées entre scripts classiques).
    const Game = {
      board: null,
      currentPlayer: 1,
      state: 'menu',
      mode: '2p',
      level: 'medium',
      lastRow: -1,
      lastCol: -1,
      winCells: [],

      init(mode, level) {
        this.board = createBoard();
        this.currentPlayer = 1;
        this.state = 'playing';
        this.mode = mode;
        this.level = level;
        this.lastRow = -1;
        this.lastCol = -1;
        this.winCells = [];
      },

      dropPiece(col) {
        const row = dropPiece(this.board, col, this.currentPlayer);
        if (row !== -1) { this.lastRow = row; this.lastCol = col; }
        return row;
      },

      checkWin(row, col, player) {
        const cells = findWin(this.board, row, col, player);
        if (cells) { this.winCells = cells; return true; }
        return false;
      },

      isDraw() { return isDraw(this.board); },

      getValidCols() { return getValidCols(this.board); },

      switchPlayer() { this.currentPlayer = this.currentPlayer === 1 ? 2 : 1; }
    };

    // === MODULE RENDERER ===
    const Renderer = {
      boardEl: null,
      cells: [],

      init() {
        this.boardEl = document.getElementById('board');
        this.boardEl.innerHTML = '';
        this.cells = [];
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.col = c;
            this.boardEl.appendChild(cell);
            this.cells.push(cell);
          }
        }
      },

      getCell(row, col) { return this.cells[row * COLS + col]; },

      dropToken(row, col, player) {
        const cell = this.getCell(row, col);
        const token = document.createElement('div');
        token.className = `token p${player}`;
        const dur = (0.18 + (row + 1) * 0.055).toFixed(2);
        token.style.setProperty('--drop-dur', `${dur}s`);
        cell.appendChild(token);
      },

      highlightWinners(cells) {
        cells.forEach(([r, c]) => this.getCell(r, c).classList.add('winner'));
      },

      clearHighlights() {
        this.cells.forEach(cell => cell.classList.remove('winner', 'hover-col'));
      },

      setColumnHover(col, active) {
        const arrow = document.getElementById('col-arrow');
        for (let r = 0; r < ROWS; r++) {
          const cell = this.getCell(r, col);
          if (active) cell.classList.add('hover-col');
          else cell.classList.remove('hover-col');
        }
        if (active) {
          const sz  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-sz')) || 70;
          const gap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))    || 8;
          arrow.style.left    = `${16 + col * (sz + gap)}px`;
          arrow.style.width   = `${sz}px`;
          arrow.style.opacity = '1';
        } else {
          arrow.style.opacity = '0';
        }
      },

      updateStatus(text, player) {
        const textEl = document.getElementById('status-text');
        textEl.textContent = text;
        textEl.classList.toggle('thinking', text.startsWith('IA réfléchit'));
        const indicator = document.getElementById('status-token');
        if (player) {
          indicator.style.background = player === 1 ? 'var(--p1)' : 'var(--p2)';
          indicator.style.boxShadow  = player === 1 ? '0 0 8px var(--p1-glow)' : '0 0 8px var(--p2-glow)';
          indicator.style.display    = 'block';
        } else {
          indicator.style.display = 'none';
        }
      }
    };

    // === MODULE SOUND ===
    const Sound = {
      ctx: null,

      _ensure() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return this.ctx;
      },

      _osc(type, freq, gainVal, duration, freqEnd) {
        const ctx = this._ensure(), t = ctx.currentTime;
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
        g.gain.setValueAtTime(gainVal, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
        osc.start(t); osc.stop(t + duration + 0.01);
      },

      drop(row, player) {
        const ctx = this._ensure(), t = ctx.currentTime;
        const dur = 0.12 + row * 0.012;
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(player === 1 ? 260 : 310, t);
        osc.frequency.exponentialRampToValueAtTime(55, t + dur);
        g.gain.setValueAtTime(0.35, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.01);
        const click = ctx.createOscillator(), gc = ctx.createGain();
        click.connect(gc); gc.connect(ctx.destination);
        click.type = 'square'; click.frequency.value = player === 1 ? 900 : 1100;
        gc.gain.setValueAtTime(0.06, t); gc.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
        click.start(t); click.stop(t + 0.05);
      },

      win(player) {
        const ctx = this._ensure();
        const freqs = player === 1 ? [392, 523.25, 659.25, 783.99] : [440, 554.37, 698.46, 880];
        freqs.forEach((f, i) => {
          const t = ctx.currentTime + i * 0.11;
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'triangle'; osc.frequency.value = f;
          g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.22, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
          osc.start(t); osc.stop(t + 0.46);
        });
      },

      draw() {
        const ctx = this._ensure(), t = ctx.currentTime;
        [440, 415.3, 392, 349.23].forEach((f, i) => {
          const st = t + i * 0.1;
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.value = f;
          g.gain.setValueAtTime(0, st); g.gain.linearRampToValueAtTime(0.18, st + 0.03);
          g.gain.exponentialRampToValueAtTime(0.0001, st + 0.38);
          osc.start(st); osc.stop(st + 0.4);
        });
      },

      ui() { this._osc('square', 1200, 0.07, 0.055, 900); }
    };

    // === MODULE DB ===
    // Données chargées depuis data/players.json (fallback embarqué si file://)
    const DB = {
      STORAGE_KEY: 'p4_user',

      PLAYERS: [
        { name: 'Nexus_77',   wins: 52, losses: 18, draws: 4  },
        { name: 'CipherX',    wins: 41, losses: 22, draws: 7  },
        { name: 'Volt_Zero',  wins: 38, losses: 19, draws: 2  },
        { name: 'Aya_Neon',   wins: 35, losses: 25, draws: 9  },
        { name: 'Kira_Blade', wins: 29, losses: 30, draws: 6  },
        { name: 'Ghost_404',  wins: 27, losses: 33, draws: 5  },
        { name: 'PixelWolf',  wins: 22, losses: 28, draws: 11 },
        { name: 'Maru_IX',    wins: 18, losses: 35, draws: 3  },
        { name: 'ByteKing',   wins: 14, losses: 40, draws: 8  },
        { name: 'Lobo_Dark',  wins:  8, losses: 44, draws: 2  }
      ],

      async loadFromJSON() {
        try {
          const res = await fetch('data/players.json');
          if (res.ok) this.PLAYERS = await res.json();
        } catch (_) { /* file:// protocol — fallback embarqué utilisé */ }
      },

      getUser() {
        const raw = localStorage.getItem(this.STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      },

      createUser(name) {
        const user = { name, wins: 0, losses: 0, draws: 0 };
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(user));
        return user;
      },

      recordResult(outcome) { // 'win' | 'loss' | 'draw'
        const user = this.getUser();
        if (!user) return;
        if (outcome === 'win')  user.wins++;
        if (outcome === 'loss') user.losses++;
        if (outcome === 'draw') user.draws++;
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(user));
      },

      score(p) { return p.wins * 3 + p.draws; },

      getRanking() {
        const all  = this.PLAYERS.map(p => ({ ...p }));
        const user = this.getUser();
        if (user) {
          const idx = all.findIndex(p => p.name === user.name);
          if (idx >= 0) all[idx] = { ...user };
          else all.push({ ...user });
        }
        return all.sort((a, b) => this.score(b) - this.score(a));
      }
    };

    // === NARRATEUR (commentaire en direct) ===
    // Commentary.analyze (engine.js) qualifie le coup ; le Narrateur le met en mots.
    const Narrator = {
      el: null,

      init() {
        this.el = document.getElementById('commentary');
        this.el.innerHTML = '';
        this.line('Nouvelle partie — à vous de jouer.', null, 'move');
      },

      // info = { type, col } renvoyé par Commentary.analyze, name = libellé du joueur
      move(info, player, name) {
        const col = info.col + 1; // colonnes affichées de 1 à 7
        let text;
        switch (info.type) {
          case 'win':    text = `${name} aligne quatre — victoire !`;            break;
          case 'block':  text = `${name} contre la menace adverse !`;            break;
          case 'threat': text = `${name} installe une menace, colonne ${col}.`;  break;
          case 'center': text = `${name} verrouille le centre.`;                 break;
          default:       text = `${name} joue colonne ${col}.`;
        }
        this.line(text, player, info.type);
      },

      draw() { this.line('Plateau plein — match nul.', null, 'move'); },

      line(text, player, type) {
        const row = document.createElement('div');
        row.className = 'comm-line';
        if (player) {
          const dot = document.createElement('span');
          dot.className = `comm-dot p${player}`;
          row.appendChild(dot);
        }
        const span = document.createElement('span');
        span.className = ('comm-text ' + (type || '')).trim();
        span.textContent = text; // textContent → un pseudo ne peut pas injecter de HTML
        row.appendChild(span);
        this.el.appendChild(row);
        while (this.el.children.length > 4) this.el.removeChild(this.el.firstChild);
      }
    };

    // === CONTROLLER ===
    let selectedMode  = '2p';
    let selectedLevel = 'medium';
    let keyCol = 3; // colonne sélectionnée au clavier

    function hide(...ids) { ids.forEach(id => document.getElementById(id).style.display = 'none'); }
    function show(id, display = 'flex') { document.getElementById(id).style.display = display; }

    // Échappe le HTML (sécurise l'injection de pseudos dans le classement).
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // Libellé d'un joueur selon le mode de jeu.
    function playerName(player) {
      const user = DB.getUser();
      if (player === 1) return user ? user.name : 'Joueur 1';
      return Game.mode === 'ai' ? 'IA' : 'Joueur 2';
    }

    function showLogin() {
      hide('menu', 'game', 'leaderboard');
      show('login');
    }

    function doLogin() {
      const name = document.getElementById('login-input').value.trim();
      if (!name) {
        document.getElementById('login-input').focus();
        return;
      }
      Sound.ui();
      DB.createUser(name);
      showMenu();
    }

    function showMenu() {
      hide('login', 'game', 'leaderboard');
      show('menu');
      const user = DB.getUser();
      if (user) {
        const initials = user.name.slice(0, 2).toUpperCase();
        document.getElementById('user-avatar').textContent = initials;
        document.getElementById('user-name').textContent   = user.name;
        document.getElementById('user-stats').textContent  =
          `${user.wins}V · ${user.losses}D · ${user.draws}N · ${DB.score(user)} pts`;
      }
    }

    function showLeaderboard() {
      Sound.ui();
      hide('menu', 'game', 'login');
      show('leaderboard');
      const user    = DB.getUser();
      const ranking = DB.getRanking();
      const tbody   = document.getElementById('lb-body');
      tbody.innerHTML = '';
      ranking.forEach((p, i) => {
        const isMe = user && p.name === user.name;
        const rank = i + 1;
        let rankEl;
        if      (rank === 1) rankEl = `<span class="rank-badge rank-1">1</span>`;
        else if (rank === 2) rankEl = `<span class="rank-badge rank-2">2</span>`;
        else if (rank === 3) rankEl = `<span class="rank-badge rank-3">3</span>`;
        else                 rankEl = `<span class="rank-badge rank-n">${rank}</span>`;
        const tr = document.createElement('tr');
        if (isMe) tr.classList.add('me');
        tr.innerHTML = `
          <td>${rankEl}</td>
          <td><span class="player-name">${esc(p.name)}${isMe ? ' <span class="you-tag">VOUS</span>' : ''}</span></td>
          <td class="right stat-win">${p.wins}</td>
          <td class="right stat-loss">${p.losses}</td>
          <td class="right stat-draw">${p.draws}</td>
          <td class="right"><span class="score-val">${DB.score(p)}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function selectMode(mode) {
      selectedMode = mode;
      document.getElementById('btn-2p').classList.toggle('active', mode === '2p');
      document.getElementById('btn-ai').classList.toggle('active', mode === 'ai');
      document.getElementById('level-group').style.display = mode === 'ai' ? 'flex' : 'none';
    }

    function selectLevel(level) {
      selectedLevel = level;
      ['easy','medium','hard'].forEach(l =>
        document.getElementById(`btn-${l}`).classList.toggle('active', l === level)
      );
    }

    function startGame() {
      Sound.ui();
      hide('menu', 'login', 'leaderboard');
      show('game');
      newRound(selectedMode, selectedLevel);
    }

    function restartGame() { Sound.ui(); newRound(Game.mode, Game.level); }

    function newRound(mode, level) {
      Game.init(mode, level);
      Renderer.init();
      Narrator.init();
      attachEvents();
      keyCol = 3;
      updateStatus();
    }

    function attachEvents() {
      Renderer.cells.forEach(cell => {
        const col = parseInt(cell.dataset.col);
        cell.addEventListener('mouseenter', () => {
          if (Game.state === 'playing') Renderer.setColumnHover(col, true);
        });
        cell.addEventListener('mouseleave', () => Renderer.setColumnHover(col, false));
        cell.addEventListener('click', () => handleClick(col));
      });
    }

    function updateStatus() {
      if (Game.state === 'playing') {
        Renderer.updateStatus(`Tour de ${playerName(Game.currentPlayer)}`, Game.currentPlayer);
      } else if (Game.state === 'ai_thinking') {
        Renderer.updateStatus('IA réfléchit', 2);
      }
    }

    function handleResult(won, draw) {
      Game.state = 'ended';
      if (won) {
        Renderer.highlightWinners(Game.winCells);
        const userWon = Game.currentPlayer === 1;
        DB.recordResult(userWon ? 'win' : 'loss');
        Sound.win(Game.currentPlayer);
        Renderer.updateStatus(`${playerName(Game.currentPlayer)} gagne !`, Game.currentPlayer);
      } else if (draw) {
        DB.recordResult('draw');
        Sound.draw();
        Narrator.draw();
        Renderer.updateStatus('Match nul !', null);
      }
    }

    function handleClick(col) {
      if (Game.state !== 'playing') return;          // bloque clic/clavier hors tour humain
      if (!Game.getValidCols().includes(col)) return;
      playMove(col);
    }

    // Joue `col` pour le joueur courant : pose, rend, sonorise, commente, puis
    // évalue l'issue ou enchaîne sur l'IA.
    function playMove(col) {
      const player = Game.currentPlayer;
      const row = Game.dropPiece(col);
      if (row === -1) return;

      Renderer.dropToken(row, col, player);
      Renderer.setColumnHover(col, false);
      Sound.drop(row, player);
      Narrator.move(Commentary.analyze(Game.board, row, col, player), player, playerName(player));

      if (Game.checkWin(row, col, player)) { handleResult(true, false); return; }
      if (Game.isDraw())                   { handleResult(false, true); return; }

      Game.switchPlayer();

      if (Game.mode === 'ai' && Game.currentPlayer === 2) {
        Game.state = 'ai_thinking';
        updateStatus();
        aiPlay();
      } else {
        updateStatus();
      }
    }

    // Coup de l'IA. Un setTimeout (et non requestAnimationFrame, throttlé en arrière-plan)
    // laisse le navigateur peindre « IA réfléchit… » avant le calcul minimax, qui reste
    // synchrone. On garantit aussi une présence minimale à l'écran.
    function aiPlay() {
      const started = performance.now();
      setTimeout(() => {
        const aiCol = AI.getBestMove(Game.board, Game.level, 2);
        const wait  = Math.max(0, 350 - (performance.now() - started));
        setTimeout(() => { Game.state = 'playing'; playMove(aiCol); }, wait);
      }, 50);
    }

    // ── Jeu au clavier ──
    function setKeyCol(c) {
      Renderer.setColumnHover(keyCol, false);
      keyCol = c;
      Renderer.setColumnHover(keyCol, true);
    }
    function moveKeyCol(delta) {
      const valid = Game.getValidCols();
      if (!valid.length) return;
      let c = keyCol;
      for (let i = 0; i < COLS; i++) {
        c = (c + delta + COLS) % COLS;
        if (valid.includes(c)) { setKeyCol(c); return; }
      }
    }
    const boardEl = document.getElementById('board');
    boardEl.addEventListener('keydown', e => {
      if (Game.state !== 'playing') return;
      if (e.key === 'ArrowLeft')       { e.preventDefault(); moveKeyCol(-1); }
      else if (e.key === 'ArrowRight')  { e.preventDefault(); moveKeyCol(1); }
      else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleClick(keyCol); }
    });
    boardEl.addEventListener('focus', () => {
      if (Game.state !== 'playing') return;
      const valid = Game.getValidCols();
      if (!valid.includes(keyCol) && valid.length) keyCol = valid[0];
      Renderer.setColumnHover(keyCol, true);
    });
    boardEl.addEventListener('blur', () => Renderer.setColumnHover(keyCol, false));

    // Touche Entrée sur le champ login
    document.getElementById('login-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    // Initialisation
    DB.loadFromJSON().then(() => {
      if (DB.getUser()) showMenu();
      else showLogin();
    });
  </script>
</body>
</html>
